<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivia Arena - Game</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>🎯 Simple Trivia Arena</h1>
      <nav>
        <a href="index.html">Lobby</a>
        <a href="arena.html" class="active">Play Game</a>
        <a href="leaderboard.html">Leaderboard</a>
      </nav>
    </header>

    <main>
      <section id="gameSection">
        <div id="playerWelcome"></div>

        <!-- Loading State Indicator -->
        <div id="loadingIndicator" class="hidden">
          ⏳ Fetching questions from Open Trivia DB...
        </div>

        <!-- Error State Container -->
        <div id="errorMessage" class="error-msg hidden"></div>

        <!-- Quiz Container generated by JS -->
        <div id="quizBox" class="hidden">
          <div class="quiz-header">
            <h3>Question <span id="currentNum">1</span></h3>
            <div id="scoreDisplay">Score: 0</div>
          </div>
          <hr />
          <p id="questionText">Question content goes here...</p>
          <div id="answerButtons" class="options-grid">
            <!-- Buttons will be appended here dynamically -->
          </div>
        </div>

        <!-- Results Container -->
        <div id="resultBox" class="hidden">
          <h2>Game Over!</h2>
          <p id="finalScoreText"></p>
          <button id="saveScoreBtn">Save Score to Leaderboard</button>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Web Engineering Capstone Project. Built from scratch.</p>
    </footer>

    <!-- Single Module Entry Point -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
